name: Supply Chain Guard

on:
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'yarn.lock'
      - 'pnpm-lock.yaml'
      - '.npmrc'
  push:
    branches: [main, master]
  schedule:
    # Run daily at 6:07 AM UTC to catch newly-reported compromised packages
    - cron: '7 6 * * *'

jobs:
  supply-chain-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Supply Chain Defender
        run: |
          pip install pyyaml
          # In production, install from PyPI or internal registry:
          # pip install supply-chain-defender
          # For now, install from local:
          pip install -e .

      - name: Run Supply Chain Guard (strict)
        id: scan
        run: |
          python -m scd ci-guard . --strict --format json --output scd-report.json
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Run Supply Chain Guard (text output)
        if: always()
        run: python -m scd ci-guard . --strict --format text
        continue-on-error: true

      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scd-report
          path: scd-report.json
          retention-days: 90

      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.scan.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = {};
            try {
              report = JSON.parse(fs.readFileSync('scd-report.json', 'utf8'));
            } catch (e) {
              report = { summary: { total_findings: 'unknown' }, findings: [] };
            }

            const critical = report.findings?.filter(f => f.severity === 'CRITICAL') || [];
            const high = report.findings?.filter(f => f.severity === 'HIGH') || [];

            let body = '## Supply Chain Defender Report\n\n';
            body += `**Findings:** ${report.summary?.total_findings || 0}\n`;
            body += `**Critical:** ${critical.length} | **High:** ${high.length}\n\n`;

            if (critical.length > 0) {
              body += '### CRITICAL Findings\n\n';
              for (const f of critical.slice(0, 5)) {
                body += `- **${f.package_name}@${f.version}**: ${f.description}\n`;
              }
              body += '\n';
            }

            if (high.length > 0) {
              body += '### HIGH Findings\n\n';
              for (const f of high.slice(0, 5)) {
                body += `- **${f.package_name}@${f.version}**: ${f.description}\n`;
              }
            }

            body += '\n---\n*Generated by Supply Chain Defender*';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail on findings
        if: steps.scan.outputs.exit_code == '2'
        run: |
          echo "::error::Supply Chain Defender found CRITICAL/HIGH severity findings. See report for details."
          exit 2

  # Optional: separate job for lockfile diff analysis
  lockfile-diff:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new dependencies
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -qE "package-lock\.json|yarn\.lock"; then
            echo "Lockfile changed — analyzing diff..."

            # Extract package names from before and after
            git show origin/${{ github.base_ref }}:package-lock.json 2>/dev/null | \
              python3 -c "
            import json, sys
            try:
                data = json.load(sys.stdin)
                for key in data.get('packages', {}):
                    if key:
                        print(key.split('node_modules/')[-1])
            except: pass
            " | sort > /tmp/deps-before.txt

            python3 -c "
            import json
            with open('package-lock.json') as f:
                data = json.load(f)
            for key in data.get('packages', {}):
                if key:
                    print(key.split('node_modules/')[-1])
            " | sort > /tmp/deps-after.txt

            NEW_DEPS=$(comm -13 /tmp/deps-before.txt /tmp/deps-after.txt)
            if [ -n "$NEW_DEPS" ]; then
              echo "::warning::New dependencies introduced in this PR:"
              echo "$NEW_DEPS"
              echo ""
              echo "Review these packages for legitimacy."
            else
              echo "No new dependencies introduced."
            fi
          else
            echo "No lockfile changes detected."
          fi
